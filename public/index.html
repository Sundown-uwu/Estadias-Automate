<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Spotify Automático</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #121212; /* Fondo oscuro tipo Spotify */
            color: white; 
            text-align: center; 
            padding-top: 80px; 
        }
        input { 
            padding: 12px; 
            font-size: 16px; 
            width: 300px; 
            border-radius: 20px; 
            border: none; 
            outline: none; 
            text-align: center; 
            margin-bottom: 20px;
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            background-color: #1DB954; /* Verde Spotify */
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background-color 0.3s;
        }
        button:hover { 
            background-color: #1ed760; 
        }
        #resultado { 
            margin-top: 30px; 
            font-size: 16px; 
            color: #b3b3b3; 
        }
    </style>
</head>
<body>
    <h1>🎵 Buscador de Spotify Remoto</h1>
    <p>Escribe la canción o artista que quieres reproducir en tu teléfono:</p>
    
    <input type="text" id="cancionInput" placeholder="Ej. Taylor Swift - Decode">
    <br>
    <button onclick="enviarCancion()">▶ Reproducir en el Teléfono</button>

    <div id="resultado"></div>

    <script>
        async function enviarCancion() {
            const cancion = document.getElementById('cancionInput').value;
            const resultadoDiv = document.getElementById('resultado');

            if (!cancion) {
                resultadoDiv.innerText = "⚠️ Por favor, escribe una canción primero.";
                resultadoDiv.style.color = "#ff4d4d"; // Rojo error
                return;
            }

            resultadoDiv.innerText = "⏳ Enviando orden al teléfono...";
            resultadoDiv.style.color = "#b3b3b3";

            try {
                // Aquí la página web se comunica con tu servidor Node.js
                const response = await fetch('/api/ejecutar-spotify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cancion: cancion }) // Enviamos el texto escrito
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultadoDiv.innerText = "✅ " + data.mensaje;
                    resultadoDiv.style.color = "#1DB954"; // Verde éxito
                } else {
                    resultadoDiv.innerText = "❌ Error: " + data.error;
                    resultadoDiv.style.color = "#ff4d4d";
                }
            } catch (error) {
                resultadoDiv.innerText = "❌ Error al conectar con el servidor local.";
                resultadoDiv.style.color = "#ff4d4d";
            }
        }
    </script>
</body>
</html>
